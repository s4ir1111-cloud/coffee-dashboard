name: Update Guest CDP

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Загрузить свежие данные из iiko
        env:
          IIKO_LOGIN: ${{ secrets.IIKO_LOGIN }}
          IIKO_PASSWORD: ${{ secrets.IIKO_PASSWORD }}
        run: python3 build_guest_cdp_data.py

      - name: Маскировать телефоны и собрать дашборд
        run: |
          python3 - << 'PYEOF'
          import json, re

          with open('guest_cdp_data.json', encoding='utf-8') as f:
              data_raw = f.read()
              data = json.loads(data_raw)

          def mask_phone(p):
              if not p:
                  return p
              digits = re.sub(r'\D', '', p)
              if len(digits) < 4:
                  return '***'
              return '+7 *** *** ' + digits[-4:]

          masked = json.loads(data_raw)
          for g in masked['guests']:
              if g.get('phone'):
                  g['phone'] = mask_phone(g['phone'])
          masked_raw = json.dumps(masked, ensure_ascii=False)

          with open('guest_cdp_dashboard_template.html', encoding='utf-8') as f:
              html = f.read()

          marker = '<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>'
          assert marker in html, "marker not found in template"

          public_html = html.replace(marker, '<script>window.__GUEST_DATA__=' + masked_raw + ';</script>\n' + marker, 1)
          with open('guest_cdp_dashboard.html', 'w', encoding='utf-8') as f:
              f.write(public_html)

          print(f"Готово: {len(data['guests'])} гостей")
          PYEOF

      - name: Собрать приватный дашборд (телефоны не скрыты)
        run: python3 build_private_dashboard.py

      - name: Загрузить приватный дашборд как артефакт
        uses: actions/upload-artifact@v4
        with:
          name: guest-cdp-private
          path: guest_cdp_dashboard_private.html
          retention-days: 7

      - name: Закоммитить и запушить
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add guest_cdp_dashboard.html
          git diff --staged --quiet || git commit -m "update guest cdp data [auto]"
          git push
