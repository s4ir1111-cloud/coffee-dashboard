name: Update P&L Data

on:
  # Ежедневно в 05:00 UTC (10:00 Тюмень UTC+5)
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:  # ручной запуск

jobs:
  update-pnl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch P&L data from IIKO
        env:
          IIKO_HOST:     ${{ secrets.IIKO_HOST }}
          IIKO_LOGIN:    ${{ secrets.IIKO_LOGIN }}
          IIKO_PASSWORD: ${{ secrets.IIKO_PASSWORD }}
        run: python pnl_connector.py

      - name: Build P&L dashboard data
        run: python build_pnl_data.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pnl_data.json pnl_data_raw.json
          git diff --staged --quiet || git commit -m "pnl: update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
