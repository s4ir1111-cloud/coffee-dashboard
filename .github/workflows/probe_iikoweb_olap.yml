name: Probe iikoWeb OLAP Fields

on:
  workflow_dispatch: {}
  push:
    paths:
      - '.github/workflows/probe_iikoweb_olap.yml'
      - 'probe_iikoweb_olap_fields.py'

concurrency:
  group: probe-iikoweb-olap
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Probe OLAP fields
        env:
          IIKO_WEB_HOST:     ${{ secrets.IIKO_WEB_HOST }}
          IIKO_WEB_LOGIN:    ${{ secrets.IIKO_WEB_LOGIN }}
          IIKO_WEB_PASSWORD: ${{ secrets.IIKO_WEB_PASSWORD }}
        run: python probe_iikoweb_olap_fields.py

      - name: Commit probe result
        run: |
          python -m json.tool olap_field_probe.json >/dev/null
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add olap_field_probe.json
          git diff --staged --quiet || git commit -m "probe: iikoweb olap fields $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase --autostash origin main
          git push
