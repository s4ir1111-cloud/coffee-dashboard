name: Update Finance Data

on:
  # Раз в день в 04:00 UTC (09:00 Тюмень UTC+5)
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:  # ручной запуск

jobs:
  update-finance:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch historical IIKO data
        env:
          IIKO_HOST:     ${{ secrets.IIKO_HOST }}
          IIKO_LOGIN:    ${{ secrets.IIKO_LOGIN }}
          IIKO_PASSWORD: ${{ secrets.IIKO_PASSWORD }}
        run: python finance_connector.py

      - name: Build finance dashboard data
        run: python build_finance_data.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add finance_data.json finance_data_raw.json
          git diff --staged --quiet || git commit -m "finance: update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
