<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garden · Выполнение плана</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap');
  :root{
    --bg:#2d3147;
    --card:#363b57;
    --card2:#3f4460;
    --text:#e7edf5;
    --muted:#9da5c0;
    --accent:#bedf3d;
    --good:#bedf3d;
    --warn:#ffd166;
    --bad:#ff5d6c;
    --border:#4a5070;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    background:var(--bg);
    color:var(--text);
    font-family:'Barlow', 'Segoe UI', Arial, sans-serif;
    min-height:100vh;
  }
  body{
    padding:14px 20px 24px;
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  /* HEADER */
  header{
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .logo-wrap{display:flex;align-items:center;gap:16px;}
  .logo-svg{display:block;height:40px;width:auto;}
  .page-title{
    color:var(--muted);
    font-size:13px;
    font-family:'Barlow Condensed',sans-serif;
    text-transform:uppercase;
    letter-spacing:2px;
  }
  .header-right{display:flex;align-items:center;gap:20px;}
  .clock{
    font-size:28px;
    color:var(--accent);
    font-weight:700;
    font-family:'Barlow Condensed',sans-serif;
    letter-spacing:2px;
  }
  .date-badge{
    background:var(--card2);
    border:1px solid var(--border);
    border-radius:8px;
    padding:4px 12px;
    font-size:12px;
    color:var(--muted);
    font-family:'Barlow Condensed',sans-serif;
  }

  /* ИТОГО */
  .summary-bar{
    display:grid;
    grid-template-columns:2fr 1fr 1fr 1fr 1fr;
    gap:10px;
  }
  .sum-card{
    background:linear-gradient(145deg,var(--card2),var(--card));
    border:1px solid var(--border);
    border-radius:10px;
    padding:12px 16px;
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .sum-card .lbl{
    font-size:10px;
    color:var(--accent);
    text-transform:uppercase;
    letter-spacing:1px;
    font-family:'Barlow Condensed',sans-serif;
    font-weight:600;
  }
  .sum-card .val{
    font-size:28px;
    font-weight:700;
    font-family:'Barlow Condensed',sans-serif;
    line-height:1;
  }
  .sum-card .sub{font-size:11px;color:var(--muted);}

  /* СЕКЦИЯ */
  .sec{
    font-size:10px;
    color:var(--accent);
    text-transform:uppercase;
    letter-spacing:2px;
    font-family:'Barlow Condensed',sans-serif;
    font-weight:600;
  }

  /* СЕТКА КАРТОЧЕК */
  .cards-grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
  }
  @media(max-width:1200px){.cards-grid{grid-template-columns:repeat(4,1fr);}}
  @media(max-width:900px){.cards-grid{grid-template-columns:repeat(3,1fr);}}
  @media(max-width:600px){.cards-grid{grid-template-columns:repeat(2,1fr);}}

  .point-card{
    background:linear-gradient(160deg,var(--card2),var(--card));
    border:1px solid var(--border);
    border-radius:12px;
    padding:14px;
    display:flex;
    flex-direction:column;
    gap:8px;
    transition:transform .15s;
  }
  .point-card:hover{transform:translateY(-2px);}

  .point-name{
    font-size:13px;
    font-weight:600;
    color:var(--muted);
    font-family:'Barlow Condensed',sans-serif;
    text-transform:uppercase;
    letter-spacing:1px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  /* БОЛ. ПРОЦЕНТ */
  .pct-main{
    font-size:48px;
    font-weight:700;
    font-family:'Barlow Condensed',sans-serif;
    line-height:1;
  }
  .pct-label{
    font-size:10px;
    color:var(--muted);
    margin-top:2px;
  }

  /* ПРОГРЕСС-БАР */
  .progress-wrap{
    background:var(--bg);
    border-radius:4px;
    height:6px;
    overflow:hidden;
  }
  .progress-bar{
    height:100%;
    border-radius:4px;
    transition:width .5s ease;
  }

  /* ср. ЧЕК */
  .check-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding-top:4px;
    border-top:1px solid var(--border);
  }
  .check-label{
    font-size:10px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:.5px;
    font-family:'Barlow Condensed',sans-serif;
  }
  .check-val{
    font-size:16px;
    font-weight:700;
    font-family:'Barlow Condensed',sans-serif;
  }
  .check-plan{
    font-size:10px;
    color:var(--muted);
    margin-top:1px;
    text-align:right;
  }

  /* PACE */
  .pace-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .pace-lbl{font-size:10px;color:var(--muted);}
  .pace-val{
    font-size:13px;
    font-weight:600;
    font-family:'Barlow Condensed',sans-serif;
  }

  /* ЦВЕТА */
  .c-good{color:var(--good);}
  .c-warn{color:var(--warn);}
  .c-bad{color:var(--bad);}

  footer{color:var(--muted);font-size:10px;text-align:center;padding-top:8px;}
</style>
</head>

    <div class="page-title">Выполнение плана</div>
  </div>
  <div class="header-right">
    <div class="date-badge" id="date-badge">—</div>
    <div class="clock" id="clock">--:--</div>
  </div>
</header>

<!-- ИТОГО -->
<div class="sec">Итого по всем кофейням</div>
<div class="summary-bar" id="summary-bar">
  <div class="sum-card">
    <div class="lbl">% от плана месяца</div>
    <div class="val" id="s-pct-plan">—</div>
    <div class="sub" id="s-day">—</div>
  </div>
  <div class="sum-card">
    <div class="lbl">% темпа</div>
    <div class="val" id="s-pace">—</div>
    <div class="sub">100% = идём по плану</div>
  </div>
  <div class="sum-card">
    <div class="lbl">Средний чек МТД</div>
    <div class="val" id="s-avg-check">—</div>
    <div class="sub" id="s-avg-plan">—</div>
  </div>
  <div class="sum-card">
    <div class="lbl">День месяца</div>
    <div class="val" id="s-day-num">—</div>
    <div class="sub" id="s-days-left">—</div>
  </div>
</div>

<!-- КАРТОЧКИ ТОЧЕК -->
<div class="sec">По кофейням</div>
<div class="cards-grid" id="cards-grid">
  <div style="color:var(--muted);font-size:13px">Загрузка данных…</div>
</div>

<footer id="footer">обновление каждые 5 мин · данные IIKO</footer>

<script>
  function updateClock(){
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  }
  updateClock(); setInterval(updateClock,1000);

  function cleanName(n){
    return n.replace(/Гарден\s+Кофе\s+/gi,'').replace(/Гарден\s+/gi,'')
            .replace(/\s*Кофе\b/gi,'').replace(/\s*кофейня\b/gi,'').trim();
  }

  function colorClass(pct){
    if(pct === null || pct === undefined) return '';
    if(pct >= 100) return 'c-good';
    if(pct >= 90)  return 'c-warn';
    return 'c-bad';
  }
  function barColor(pct){
    if(pct >= 100) return 'var(--good)';
    if(pct >= 90)  return 'var(--warn)';
    return 'var(--bad)';
  }

  function renderData(data){
    if(!data.plan) return;
    const ps = data.plan.summary;
    const today = data.date;
    document.getElementById('date-badge').textContent = today;

    // Сводка
    const pctPlanEl = document.getElementById('s-pct-plan');
    pctPlanEl.textContent = ps.pct_of_plan + '%';
    pctPlanEl.className = 'val';  // всегда белый

    const paceEl = document.getElementById('s-pace');
    paceEl.textContent = ps.pct_vs_expected + '%';
    paceEl.className = 'val ' + colorClass(ps.pct_vs_expected);  // цвет только у темпа

    document.getElementById('s-day').textContent = `День ${ps.day_of_month} из ${ps.days_in_month}`;
    document.getElementById('s-day-num').textContent = ps.day_of_month;
    document.getElementById('s-days-left').textContent = `Осталось ${ps.days_in_month - ps.day_of_month} дней`;

    if(ps.mtd_avg_check){
      document.getElementById('s-avg-check').textContent = ps.mtd_avg_check.toLocaleString('ru-RU') + ' ₽';
      document.getElementById('s-avg-plan').textContent = 'по всем точкам';
    }

    // Карточки точек
    const grid = document.getElementById('cards-grid');
    grid.innerHTML = '';

    const pts = [...data.plan.points].sort((a,b) => b.pct_of_plan - a.pct_of_plan);

    pts.forEach(p => {
      const pct = p.pct_of_plan;
      const pace = p.pct_vs_expected;
      const barW = Math.min(pct, 100);
      const hasCheck = p.avg_check_plan != null && p.mtd_avg_check > 0;
      const checkPct = p.pct_avg_check;

      const card = document.createElement('div');
      card.className = 'point-card';
      card.innerHTML = `
        <div class="point-name">${cleanName(p.name)}</div>
        <div>
          <div class="pct-main">${pct}%</div>
          <div class="pct-label">от плана месяца</div>
        </div>
        <div class="progress-wrap">
          <div class="progress-bar" style="width:${barW}%;background:${barColor(pct)}"></div>
        </div>
        <div class="pace-row">
          <span class="pace-lbl">% темпа</span>
          <span class="pace-val ${colorClass(pace)}">${pace != null ? pace+'%' : '—'}</span>
        </div>
        <div class="check-row">
          <div>
            <div class="check-label">Ср. чек МТД</div>
            ${hasCheck ? `<div class="check-plan">план: ${p.avg_check_plan} ₽</div>` : ''}
          </div>
          <div style="text-align:right">
            <div class="check-val">${p.mtd_avg_check > 0 ? p.mtd_avg_check.toLocaleString('ru-RU')+' ₽' : '—'}</div>
            ${hasCheck && checkPct != null ? `<div class="check-plan">${checkPct}%</div>` : ''}
          </div>
        </div>`;
      grid.appendChild(card);
    });

    document.getElementById('footer').textContent =
      `Данные на ${today} · обновление каждые 5 мин`;
  }

  function loadData(){
    fetch('dashboard_data_view.json',{cache:'no-store'})
      .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
      .then(renderData)
      .catch(err=>console.error('Ошибка:',err));
  }
  loadData();
  setInterval(loadData, 5*60*1000);
</script>
</body>
</html>
